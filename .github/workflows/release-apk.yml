name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Create debug keystore for signing
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA -keysize 2048 -validity 10000

      - name: Zipalign and sign APK
        run: |
          SDK_ROOT="$ANDROID_SDK_ROOT"
          if [ -z "$SDK_ROOT" ]; then SDK_ROOT="$ANDROID_HOME"; fi
          BT="$SDK_ROOT/build-tools/34.0.0"
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="app/build/outputs/apk/release/simpleToDo-release.apk"
          "$BT/zipalign" -p -f 4 "$UNSIGNED" "$ALIGNED"
          "$BT/apksigner" sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android --out "$SIGNED" "$ALIGNED"
          "$BT/apksigner" verify --verbose "$SIGNED"

      - name: Upload release APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/simpleToDo-release.apk
          generate_release_notes: true
